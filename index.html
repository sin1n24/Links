<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Links Web β</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #1e1e1e; --panel: #262626; --border: #3a3a3a; --text: #e8e8e8; --accent: #4ea1ff; --muted: #9a9a9a;
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
            background: var(--bg); color: var(--text); margin: 0; padding: 10px;
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        #main-column { display: flex; flex-direction: column; gap: 8px; flex: 1 1 640px; min-width: 320px; max-width: 900px; }
        #canvas-wrap { position: relative; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: #000; aspect-ratio: 4 / 3; }
        #main-canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair; }
        #select-rect { position: absolute; border: 1px dashed #fff; background: rgba(255,255,255,0.15); pointer-events: none; display: none; }

        #toolbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; }
        #hidden-mode-row { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; opacity: 0.75; }
        #hidden-mode-row .icon-btn { font-size: 11px; }

        .icon-btn {
            background: #333; color: var(--text); border: 1px solid var(--border); border-radius: 4px;
            padding: 6px 9px; cursor: pointer; font-size: 13px; line-height: 1.2; white-space: nowrap;
        }
        .icon-btn:hover { background: #3d3d3d; }
        .icon-btn.active { background: var(--accent); color: #08243d; border-color: var(--accent); }

        #help-bar { min-height: 2.6em; padding: 6px 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; font-size: 12.5px; color: var(--muted); }
        #help-bar.persistent { color: var(--text); }

        #log-container { border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; height: 90px; overflow-y: auto; background: #171717; font-size: 12px; }
        #log-container p { margin: 2px 0; word-break: break-word; }

        #ui-container { display: flex; flex-direction: column; gap: 8px; flex: 1 1 300px; min-width: 280px; max-width: 380px; }
        .section { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 8px; }
        .section h3 { margin: 0 0 6px; font-size: 12.5px; color: var(--muted); font-weight: 600; }

        .param-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; padding: 3px 4px; border-radius: 3px; cursor: ns-resize; user-select: none; }
        .param-row:hover { background: rgba(255,255,255,0.08); }
        .param-row label { flex: 1 1 auto; font-size: 12px; }
        .param-row .sensitivity { display: flex; gap: 1px; width: 12px; }
        .param-row .sensitivity i { flex: 1; height: 10px; background: #444; border-radius: 1px; }
        .param-row .sensitivity i.on { background: var(--accent); }
        .param-row .value-chip { min-width: 68px; text-align: right; font-variant-numeric: tabular-nums; font-size: 12px; padding: 1px 4px; border-radius: 3px; background: #111; border: 1px solid var(--border); }
        .param-row input[type=number] { width: 68px; background: #111; color: var(--text); border: 1px solid var(--accent); border-radius: 3px; padding: 1px 4px; font-size: 12px; }
        .param-row select { flex: 0 0 auto; background: #111; color: var(--text); border: 1px solid var(--border); border-radius: 3px; font-size: 12px; }
        .param-row.readonly { cursor: default; }
        .param-row.readonly .value-chip { opacity: 0.65; }

        #file-io { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; }
        #file-io .icon-btn { align-self: flex-start; }

        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none;
            align-items: center; justify-content: center; z-index: 1000;
        }
        #modal-box { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px; max-width: 420px; width: 90%; font-size: 13px; }
        #modal-box p { white-space: pre-line; margin: 0 0 12px; }
        #modal-buttons { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }

        input[type=file] { display: none; }
    </style>
</head>
<body>
    <div id="main-column">
        <div id="toolbar"></div>
        <div id="hidden-mode-row"></div>
        <div id="canvas-wrap">
            <canvas id="main-canvas"></canvas>
            <div id="select-rect"></div>
        </div>
        <div id="help-bar" class="persistent"></div>
        <div id="log-container"></div>
    </div>

    <div id="ui-container">
        <div class="section" id="file-io">
            <h3>ファイル</h3>
        </div>
        <div class="section">
            <h3>パラメータ</h3>
            <div id="param-panel"></div>
        </div>
        <div class="section">
            <h3>表示設定</h3>
            <div class="param-row">
                <label for="bg-color-slider">背景の明るさ</label>
                <input type="range" id="bg-color-slider" min="0" max="255" step="1" value="0">
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept=".links,.json,text/plain">
    <input type="file" id="dxf-file-input" accept=".dxf">

    <div id="modal-overlay">
        <div id="modal-box">
            <p id="modal-text"></p>
            <div id="modal-buttons"></div>
        </div>
    </div>

    <script src="vendor/dxf.umd.js"></script>
    <script src="datatypes.js"></script>
    <script src="dxf_io.js"></script>
    <script src="graphics.js"></script>
    <script src="config.js"></script>
    <script src="simulation.js"></script>
    <script src="graph_panel.js"></script>
    <script src="cad_export.js"></script>
    <script src="animation.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
