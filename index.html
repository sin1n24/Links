<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8274345994743020"
     crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Links Web β</title>
    <link rel="icon" href="favicon.ico">
    <!-- favicon.ico and icons/*.png are the original Win app's own toolbar
         bitmaps (Links/*.bmp, double-link.ico), background-keyed to
         transparent PNG - see icons/src/convert.py for provenance/rebuild. -->

    <style>
        /* Light theme is the default (dark mode starts OFF - see ui.js's
           dark-mode toggle, which adds/removes body.dark and also drives
           sim.bgColor/graphics.backgroundColor together with these vars). */
        :root {
            color-scheme: light;
            --bg: #f2f2f5; --panel: #ffffff; --border: #d7d7dc; --text: #1c1c1e; --accent: #2f6fd1; --muted: #666666;
            --surface: #ffffff; --surface-hover: #eef1f6; --input-bg: #f5f5f7; --canvas-fallback: #ffffff;
        }
        body.dark {
            color-scheme: dark;
            --bg: #1e1e1e; --panel: #262626; --border: #3a3a3a; --text: #e8e8e8; --accent: #4ea1ff; --muted: #9a9a9a;
            --surface: #333333; --surface-hover: #3d3d3d; --input-bg: #111111; --canvas-fallback: #000000;
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
            background: var(--bg); color: var(--text); margin: 0; padding: 10px;
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        #main-column { display: flex; flex-direction: column; gap: 8px; flex: 1 1 640px; min-width: 320px; max-width: 900px; }
        #canvas-wrap { position: relative; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--canvas-fallback); aspect-ratio: 4 / 3; }
        #main-canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair; }

        #toolbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; }
        #hidden-mode-row { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; }
        #hidden-mode-row.hidden { display: none; }
        #hidden-mode-row .icon-btn { font-size: 11px; }

        /* Buttons intentionally do NOT follow the light/dark theme vars
           above - same fixed dark-gray/outline/blue look in both modes, so
           the toolbar doesn't get harder to read against a light page. */
        .icon-btn {
            background: #545454; color: #f0f0f0; border: 1px solid #666666; border-radius: 4px;
            padding: 5px 9px; cursor: pointer; font-size: 13px; line-height: 1.2; white-space: nowrap;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .icon-btn:hover { background: #4ea1ff; color: #08243d; }
        .icon-btn.active { border: 3px solid #4ea1ff; padding: 3px 7px; }
        .icon-btn.active:hover { background: #4ea1ff; color: #08243d; }
        .icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .icon-btn:disabled:hover { background: #545454; color: #f0f0f0; }
        .icon-btn .icon-img { width: 20px; height: 20px; image-rendering: pixelated; flex: none; }
        .icon-btn .icon-emoji { display: inline-flex; align-items: center; justify-content: center; font-size: 16px; line-height: 1; }
        .icon-btn .icon-label { white-space: nowrap; }
        /* Icon-only toolbar buttons (instruction doc §4) - the beta-features
           row and the AutoCAD-command button keep their text label since no
           original bitmap exists for them (see ui.js _buildToolbar). */
        #toolbar .icon-btn .icon-label { display: none; }

        #help-bar { min-height: 2.6em; padding: 6px 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; font-size: 12.5px; color: var(--muted); }
        #help-bar.persistent { color: var(--text); }

        #log-container { border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; height: 90px; overflow-y: auto; background: var(--input-bg); font-size: 12px; }
        #log-container p { margin: 2px 0; word-break: break-word; }

        #ui-container { display: flex; flex-direction: column; gap: 8px; flex: 1 1 300px; min-width: 280px; max-width: 380px; }
        .section { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 8px; }
        .section h3 { margin: 0 0 6px; font-size: 12.5px; color: var(--muted); font-weight: 600; }
        #manual-link-section { text-align: center; }
        #manual-link-section a { color: var(--text); text-decoration: none; font-size: 13px; }
        #manual-link-section a:hover { color: var(--accent); text-decoration: underline; }

        .param-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; padding: 3px 4px; border-radius: 3px; cursor: ns-resize; user-select: none; }
        .param-row:hover { background: var(--surface-hover); }
        .param-row label { flex: 1 1 auto; font-size: 12px; }
        .param-row .sensitivity { display: flex; gap: 1px; width: 12px; cursor: pointer; }
        .param-row .sensitivity i { flex: 1; height: 10px; background: var(--border); border-radius: 1px; }
        .param-row .sensitivity i.on { background: var(--accent); }
        .param-row .value-chip { min-width: 68px; text-align: right; font-variant-numeric: tabular-nums; font-size: 12px; padding: 1px 4px; border-radius: 3px; background: var(--input-bg); border: 1px solid var(--border); }
        .param-row input[type=text] { width: 68px; background: var(--input-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 3px; padding: 1px 4px; font-size: 12px; text-align: right; }
        .param-row select { flex: 0 0 auto; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 3px; font-size: 12px; }
        .param-row.readonly { cursor: default; }
        .param-row.readonly .value-chip { opacity: 0.65; }
        .param-row .step-btn { padding: 1px 7px; font-size: 13px; line-height: 1.4; flex: none; }
        .param-row.graph-toggle-row { border-top: 1px solid var(--border); margin-top: 6px; padding-top: 8px; }

        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none;
            align-items: center; justify-content: center; z-index: 1000;
        }
        #modal-box { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px; max-width: 420px; width: 90%; font-size: 13px; }
        #modal-box p { white-space: pre-line; margin: 0 0 12px; }
        #modal-buttons { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }

        input[type=file] { display: none; }

        #site-footer { flex-basis: 100%; display: flex; align-items: center; justify-content: center; gap: 36px; padding: 8px 0 2px; }
        #site-footer a { display: inline-flex; align-items: center; opacity: 0.8; }
        #site-footer a:hover { opacity: 1; }
        #site-footer .footer-logo { height: 52px; width: auto; display: block; }
        #site-footer .footer-logo-dark { display: none; }
        body.dark #site-footer .footer-logo-light { display: none; }
        body.dark #site-footer .footer-logo-dark { display: block; }
        #site-footer .footer-icon { width: 36px; height: 36px; fill: var(--text); display: block; }
    </style>
</head>
<body>
    <div id="main-column">
        <div id="toolbar"></div>
        <div id="hidden-mode-row"></div>
        <div id="canvas-wrap">
            <canvas id="main-canvas"></canvas>
        </div>
        <div id="help-bar" class="persistent"></div>
        <div id="log-container"></div>
    </div>

    <div id="ui-container">
        <div class="section">
            <h3>パラメータ</h3>
            <div id="param-panel"></div>
        </div>
        <div class="section" id="manual-link-section">
            <a href="manual.html" target="_blank" rel="noopener">📖 取扱説明書</a>
        </div>
    </div>

        </a>
        <a href="https://x.com/sin1west" target="_blank" rel="noopener" aria-label="X (旧Twitter)">
            <svg class="footer-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>

    <input type="file" id="file-input" accept=".links,.json,text/plain">
    <input type="file" id="dxf-file-input" accept=".dxf">

    <div id="modal-overlay">
        <div id="modal-box">
            <p id="modal-text"></p>
            <div id="modal-buttons"></div>
        </div>
    </div>

    <script src="vendor/dxf.umd.js"></script>
    <script src="datatypes.js"></script>
    <script src="dxf_io.js"></script>
    <script src="graphics.js"></script>
    <script src="config.js"></script>
    <script src="simulation.js"></script>
    <script src="graph_panel.js"></script>
    <script src="cad_export.js"></script>
    <script src="animation.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
